<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
  <title>🏆 Твой Фитнес-Хаб · Привычки + Статистика</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0b0b0c;
      color: #eaeaea;
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(22, 22, 24, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.2rem;
      padding: 1.8rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.07);
    }
    h1 {
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.6px;
      background: linear-gradient(135deg, #ff8c52, #ff3e6c, #b266ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .subtitle { color: #8e8e93; margin-bottom: 1.8rem; font-size: 0.9rem; }
    .card {
      background: rgba(44, 44, 48, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 1.4rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .section-title {
      font-weight: 650;
      font-size: 1.15rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .habit-row, .today-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
      background: rgba(255,255,255,0.03);
      padding: 0.6rem 0.9rem;
      border-radius: 1rem;
    }
    .habit-row input, .today-row input[type="number"] {
      background: #2c2c2e;
      border: 1px solid #3a3a3c;
      color: #fff;
      padding: 0.7rem 0.9rem;
      border-radius: 0.8rem;
      font-size: 0.95rem;
      width: auto;
      min-width: 90px;
    }
    .habit-row input:focus, .today-row input:focus {
      border-color: #ff8c52;
      outline: none;
    }
    .btn {
      border: none;
      border-radius: 0.8rem;
      padding: 0.6rem 1.2rem;
      font-weight: 600;
      cursor: pointer;
      background: #ff3e6c;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.9rem;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn.secondary { background: #3a3a3c; }
    .btn.small { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    .checkbox-big {
      width: 1.4rem; height: 1.4rem; accent-color: #ff8c52; transform: scale(1.1); margin-right: 0.2rem;
    }
    .tag {
      font-weight: 500;
      background: #2c2c2e;
      padding: 0.2rem 0.8rem;
      border-radius: 1rem;
      font-size: 0.8rem;
    }
    .period-selector {
      display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 1rem 0;
    }
    .period-btn {
      background: #2c2c2e; border: 1px solid #444; padding: 0.45rem 1rem;
      border-radius: 2rem; font-weight:600; font-size:0.8rem; cursor:pointer; color:#ccc;
    }
    .period-btn.active { background: #ff8c52; border-color: #ff8c52; color:#0a0a0a; }
    .stats-grid { display: flex; flex-direction: column; gap: 0.5rem; }
    canvas { margin-top: 1rem; }
    hr { border-color: #333; margin: 1.3rem 0; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    @media (max-width: 480px) {
      .container { padding: 1.2rem; }
      .habit-row, .today-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏋️‍♂️ Фитнес-Хаб</h1>
    <div class="subtitle">Твои привычки • Дневная доска • Статистика</div>

    <!-- Блок управления данными -->
    <div class="flex-between" style="margin-bottom:1.2rem;">
      <button id="exportBtn" class="btn secondary small">📤 Скачать данные</button>
      <button id="importBtn" class="btn secondary small">📥 Загрузить из файла</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>

    <!-- Секция Привычки (шаблоны) -->
    <div class="card">
      <div class="section-title"><span>⭐</span> Мои привычки</div>
      <div id="habitsContainer">
        <!-- динамически -->
      </div>
      <div class="habit-row" style="background:transparent; padding-left:0;">
        <input type="text" id="newHabitName" placeholder="Название (пресс)" style="flex:2;">
        <input type="number" id="newHabitGoal" placeholder="Цель, раз" min="1" value="50" style="flex:1;">
        <button id="addHabitBtn" class="btn small">➕ Добавить</button>
      </div>
      <div style="font-size:0.75rem; color:#8e8e93; margin-top:0.3rem;">💡 Эти упражнения будут появляться каждый день</div>
    </div>

    <!-- Доска «Сегодня» -->
    <div class="card">
      <div class="section-title"><span>📅</span> Сегодня – <span id="todayDate"></span></div>
      <div id="todayBoard">
        <!-- генерируется из привычек -->
      </div>
      <div style="margin-top:0.8rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button id="addCustomTodayBtn" class="btn secondary small">✏️ Разовое упражнение</button>
      </div>
      <div id="todayLog" style="margin-top:1rem;"></div>
    </div>

    <!-- Статистика -->
    <div class="card">
      <div class="section-title"><span>📊</span> Статистика по периодам</div>
      <div class="period-selector" id="periodButtons">
        <button class="period-btn active" data-period="week">Неделя</button>
        <button class="period-btn" data-period="month">Месяц</button>
        <button class="period-btn" data-period="quarter">3 мес</button>
        <button class="period-btn" data-period="halfyear">6 мес</button>
        <button class="period-btn" data-period="year">Год</button>
      </div>
      <div id="periodStats" class="stats-grid"></div>
      <canvas id="progressChart" width="400" height="200"></canvas>
    </div>
  </div>

  <script>
    (function() {
      // ---------- Хранилище ----------
      const STORAGE_HABITS = 'fitness_habits';
      const STORAGE_RECORDS = 'fitness_records';

      let habits = [];            // { id, name, goal }
      let records = [];          // { id, date, exercise, reps, habitId? }

      function loadData() {
        const h = localStorage.getItem(STORAGE_HABITS);
        habits = h ? JSON.parse(h) : [];
        const r = localStorage.getItem(STORAGE_RECORDS);
        records = r ? JSON.parse(r) : [];
        // сортировка записей по дате (свежие выше)
        records.sort((a,b) => (b.date||'').localeCompare(a.date||'') || b.id - a.id);
      }

      function saveHabits() { localStorage.setItem(STORAGE_HABITS, JSON.stringify(habits)); }
      function saveRecords() { localStorage.setItem(STORAGE_RECORDS, JSON.stringify(records)); }

      // ---------- Вспомогательные ----------
      function getTodayISO() { return new Date().toISOString().split('T')[0]; }
      function formatDateISO(iso) {
        if (!iso) return '';
        const [y,m,d] = iso.split('-');
        return `${d}.${m}.${y}`;
      }

      // ---------- DOM ----------
      const habitsContainer = document.getElementById('habitsContainer');
      const newHabitName = document.getElementById('newHabitName');
      const newHabitGoal = document.getElementById('newHabitGoal');
      const addHabitBtn = document.getElementById('addHabitBtn');
      const todayBoard = document.getElementById('todayBoard');
      const todayLogDiv = document.getElementById('todayLog');
      const todayDateSpan = document.getElementById('todayDate');
      const periodStatsDiv = document.getElementById('periodStats');
      const periodButtons = document.getElementById('periodButtons');
      const addCustomTodayBtn = document.getElementById('addCustomTodayBtn');
      const exportBtn = document.getElementById('exportBtn');
      const importBtn = document.getElementById('importBtn');
      const importFile = document.getElementById('importFile');

      let chart = null;
      let currentPeriod = 'week';

      // ---------- Отрисовка привычек ----------
      function renderHabits() {
        if (!habits.length) {
          habitsContainer.innerHTML = '<div style="color:#8e8e93; padding:0.5rem 0;">Пока нет привычек. Создай первую!</div>';
          return;
        }
        let html = '';
        habits.forEach(h => {
          html += `
            <div class="habit-row">
              <span style="flex:2; font-weight:500;">${h.name}</span>
              <span class="tag">🎯 цель: ${h.goal}</span>
              <button class="btn secondary small" data-delhabit="${h.id}">🗑️</button>
            </div>
          `;
        });
        habitsContainer.innerHTML = html;
        document.querySelectorAll('[data-delhabit]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = Number(e.currentTarget.getAttribute('data-delhabit'));
            habits = habits.filter(h => h.id !== id);
            saveHabits();
            renderHabits();
            renderTodayBoard(); // обновить доску, т.к. привычки изменились
          });
        });
      }

      // ---------- Доска Сегодня ----------
      function getTodayRecords() {
        const today = getTodayISO();
        return records.filter(r => r.date === today);
      }

      function renderTodayBoard() {
        const today = getTodayISO();
        todayDateSpan.textContent = formatDateISO(today);
        const todaysRecords = getTodayRecords();

        // Для каждой привычки создаём строку
        let html = '';
        habits.forEach(habit => {
          // Ищем запись за сегодня по habitId
          const existing = todaysRecords.find(r => r.habitId === habit.id);
          const done = !!existing;
          const repsValue = existing ? existing.reps : '';
          html += `
            <div class="today-row" data-habit-id="${habit.id}">
              <input type="checkbox" class="checkbox-big" ${done ? 'checked' : ''} title="Отметить выполнение">
              <span style="flex:2; font-weight:500;">${habit.name}</span>
              <input type="number" class="today-reps" placeholder="${habit.goal} (цель)" value="${repsValue}" min="0" step="1" style="width:90px;">
              <button class="btn small save-today-btn" style="display:none;">✔️</button>
              <span class="tag" style="background:#ff8c5240;">цель: ${habit.goal}</span>
            </div>
          `;
        });
        // Если нет привычек
        if (!habits.length) {
          html = '<div style="color:#8e8e93;">Сначала создай привычки (вверху)</div>';
        }
        todayBoard.innerHTML = html;

        // Навешиваем обработчики
        document.querySelectorAll('.today-row').forEach(row => {
          const habitId = Number(row.getAttribute('data-habit-id'));
          const checkbox = row.querySelector('.checkbox-big');
          const repsInput = row.querySelector('.today-reps');
          const saveBtn = row.querySelector('.save-today-btn');

          // Автосохранение при изменении числа или галочки
          const saveTodayEntry = () => {
            const checked = checkbox.checked;
            let reps = parseInt(repsInput.value, 10);
            if (!checked) {
              // если галочка снята – удаляем запись за сегодня по этой привычке
              records = records.filter(r => !(r.date === getTodayISO() && r.habitId === habitId));
            } else {
              if (isNaN(reps) || reps < 0) reps = 0;
              // ищем запись
              const existingIdx = records.findIndex(r => r.date === getTodayISO() && r.habitId === habitId);
              if (existingIdx >= 0) {
                records[existingIdx].reps = reps;
              } else {
                records.push({
                  id: Date.now(),
                  date: getTodayISO(),
                  exercise: habits.find(h => h.id === habitId)?.name || 'привычка',
                  reps: reps,
                  habitId: habitId
                });
              }
            }
            saveRecords();
            renderTodayLog();
            updateStatsAndChart();
          };

          checkbox.addEventListener('change', saveTodayEntry);
          repsInput.addEventListener('change', saveTodayEntry);
          repsInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveTodayEntry();
          });
        });

        renderTodayLog();
      }

      // Отображение лога сегодняшних записей (всех, включая разовые)
      function renderTodayLog() {
        const todays = getTodayRecords();
        if (todays.length === 0) {
          todayLogDiv.innerHTML = '<div style="color:#8e8e93;">Нет записей за сегодня</div>';
          return;
        }
        let html = '<div style="font-weight:600; margin-bottom:0.4rem;">✅ Выполнено:</div>';
        todays.forEach(r => {
          html += `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#ffffff05; padding:0.4rem 0.8rem; border-radius:0.6rem; margin-bottom:0.3rem;">
              <span>${r.exercise} – ${r.reps} раз</span>
              <button class="btn small secondary" data-delrecord="${r.id}">✕</button>
            </div>
          `;
        });
        todayLogDiv.innerHTML = html;
        document.querySelectorAll('[data-delrecord]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = Number(e.currentTarget.getAttribute('data-delrecord'));
            records = records.filter(r => r.id !== id);
            saveRecords();
            renderTodayBoard(); // полное обновление доски и лога
            updateStatsAndChart();
          });
        });
      }

      // Добавить разовое упражнение
      function addCustomToday() {
        const name = prompt('Название упражнения:');
        if (!name) return;
        const repsStr = prompt('Количество повторений:', '0');
        const reps = parseInt(repsStr, 10);
        if (isNaN(reps) || reps < 0) return;
        records.push({
          id: Date.now(),
          date: getTodayISO(),
          exercise: name.trim(),
          reps: reps,
          habitId: null
        });
        saveRecords();
        renderTodayBoard();
        updateStatsAndChart();
      }

      // ---------- Статистика и график ----------
      function getPeriodStart(period, refDate = new Date()) {
        const d = new Date(refDate);
        switch(period) {
          case 'week': d.setDate(d.getDate()-7); break;
          case 'month': d.setMonth(d.getMonth()-1); break;
          case 'quarter': d.setMonth(d.getMonth()-3); break;
          case 'halfyear': d.setMonth(d.getMonth()-6); break;
          case 'year': d.setFullYear(d.getFullYear()-1); break;
        }
        return d.toISOString().split('T')[0];
      }

      function updateStatsAndChart() {
        const start = getPeriodStart(currentPeriod);
        const end = getTodayISO();
        const filtered = records.filter(r => r.date >= start && r.date <= end);
        
        // группировка по упражнениям
        const aggr = new Map();
        filtered.forEach(r => {
          const ex = r.exercise.trim();
          aggr.set(ex, (aggr.get(ex) || 0) + Number(r.reps));
        });
        const sorted = Array.from(aggr.entries()).sort((a,b) => b[1]-a[1]);

        let statsHtml = '';
        if (sorted.length === 0) {
          statsHtml = 'Нет данных за период';
        } else {
          sorted.forEach(([ex, total]) => {
            statsHtml += `<div class="flex-between"><span>🏅 ${ex}</span> <strong>${total}</strong></div>`;
          });
          const totalAll = sorted.reduce((sum, [,t]) => sum + t, 0);
          statsHtml += `<div style="border-top:1px solid #444; margin-top:0.6rem; padding-top:0.5rem;">💪 Всего: ${totalAll} повторений</div>`;
        }
        periodStatsDiv.innerHTML = statsHtml;

        // График
        const ctx = document.getElementById('progressChart').getContext('2d');
        if (chart) chart.destroy();
        const labels = sorted.map(([ex]) => ex);
        const data = sorted.map(([,t]) => t);
        chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: 'Повторения',
              data,
              backgroundColor: ['#ff8c52','#ff3e6c','#b266ff','#48dbfb','#feca57','#ff9ff3'],
              borderRadius: 8
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, grid: { color: '#3a3a3c' }, ticks: { color: '#ccc' } },
                      x: { ticks: { color: '#ccc' } } }
          }
        });
      }

      // Переключение периода
      function setPeriod(period, el) {
        currentPeriod = period;
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');
        updateStatsAndChart();
      }

      // ---------- Экспорт / Импорт ----------
      function exportData() {
        const data = { habits, records };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `fitness_backup_${getTodayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.habits && Array.isArray(data.habits)) {
              habits = data.habits;
              saveHabits();
            }
            if (data.records && Array.isArray(data.records)) {
              records = data.records;
              saveRecords();
            }
            renderAll();
            alert('Данные успешно загружены!');
          } catch (err) {
            alert('Ошибка: неверный формат файла');
          }
        };
        reader.readAsText(file);
      }

      function renderAll() {
        renderHabits();
        renderTodayBoard();
        updateStatsAndChart();
      }

      // ---------- Инициализация ----------
      function init() {
        loadData();
        // если привычек нет, создадим демо
        if (habits.length === 0) {
          habits = [
            { id: 161, name: 'Отжимания', goal: 50 },
            { id: 162, name: 'Пресс', goal: 100 },
            { id: 163, name: 'Приседания', goal: 60 }
          ];
          saveHabits();
        }
        renderAll();

        // События
        addHabitBtn.addEventListener('click', () => {
          const name = newHabitName.value.trim();
          const goal = parseInt(newHabitGoal.value, 10);
          if (!name || isNaN(goal) || goal <= 0) return alert('Введи название и цель');
          habits.push({ id: Date.now(), name, goal });
          saveHabits();
          newHabitName.value = '';
          newHabitGoal.value = 50;
          renderHabits();
          renderTodayBoard();
        });

        addCustomTodayBtn.addEventListener('click', addCustomToday);

        periodButtons.addEventListener('click', (e) => {
          if (e.target.classList.contains('period-btn')) {
            setPeriod(e.target.dataset.period, e.target);
          }
        });

        exportBtn.addEventListener('click', exportData);
        importBtn.addEventListener('click', () => importFile.click());
        importFile.addEventListener('change', (e) => {
          if (e.target.files[0]) importData(e.target.files[0]);
        });

        // Установим активный период
        const activePeriodBtn = document.querySelector('.period-btn.active');
        if (activePeriodBtn) currentPeriod = activePeriodBtn.dataset.period;
        updateStatsAndChart();
      }

      init();
    })();
  </script>
</body>
</html>
