<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
  <title>💪 Полгода прогресса · Отжимания & Пресс</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0c0c0e;
      color: #f0f0f0;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(22, 22, 24, 0.85);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.2rem;
      padding: 1.8rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.07);
    }
    h1 {
      font-weight: 700;
      font-size: 2rem;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
    }
    .subtitle {
      color: #8e8e93;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .plan-table {
      overflow-x: auto;
      border-radius: 1rem;
      margin: 1.5rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(44, 44, 48, 0.5);
      backdrop-filter: blur(10px);
    }
    th, td {
      padding: 0.8rem 0.6rem;
      text-align: center;
      border-bottom: 1px solid #3a3a3c;
      font-size: 0.9rem;
    }
    th {
      background: rgba(255,255,255,0.05);
      font-weight: 600;
      color: #feca57;
    }
    .done-check {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #4caf50;
      transform: scale(1.2);
      cursor: pointer;
    }
    .fact-input {
      width: 60px;
      background: #2c2c2e;
      border: 1px solid #3a3a3c;
      border-radius: 0.5rem;
      padding: 0.3rem 0.4rem;
      color: white;
      text-align: center;
    }
    .week-row:hover { background: rgba(255,255,255,0.03); }
    .goal-text { font-weight: 600; color: #ff8c52; }
    .stats-panel {
      background: rgba(44, 44, 48, 0.6);
      border-radius: 1.2rem;
      padding: 1.2rem;
      margin-top: 1.5rem;
    }
    .period-btns {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .period-btn {
      background: #2c2c2e;
      border: 1px solid #444;
      color: #ccc;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .period-btn.active {
      background: #feca57;
      color: #0a0a0a;
      border-color: #feca57;
    }
    canvas { margin-top: 1rem; }
    .btn-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin: 1rem 0;
    }
    .btn {
      background: #3a3a3c;
      border: none;
      border-radius: 0.8rem;
      padding: 0.5rem 1.1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn.primary { background: #ff6b6b; }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      th, td { padding: 0.5rem 0.3rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📅 Полгода силы</h1>
    <div class="subtitle">
      <span>Старт: 21.06.2026</span>
      <span>⏳ 26 недель</span>
      <span>📈 +5 каждую неделю</span>
    </div>

    <div class="btn-row">
      <button id="exportBtn" class="btn">📤 Скачать</button>
      <button id="importBtn" class="btn">📥 Загрузить</button>
      <input type="file" id="importFile" accept=".json" hidden>
      <button id="resetBtn" class="btn primary">🔄 Сбросить прогресс</button>
    </div>

    <div class="plan-table">
      <table id="planTable">
        <thead>
          <tr>
            <th>Неделя</th>
            <th>Даты</th>
            <th>Отжимания<br><small>3×?</small></th>
            <th>✅</th>
            <th>Факт</th>
            <th>Пресс<br><small>3×?</small></th>
            <th>✅</th>
            <th>Факт</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="stats-panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">📊 Статистика</h3>
        <div class="period-btns" id="periodButtons">
          <button class="period-btn active" data-period="week">Неделя</button>
          <button class="period-btn" data-period="month">Месяц</button>
          <button class="period-btn" data-period="quarter">3 мес</button>
          <button class="period-btn" data-period="halfyear">6 мес</button>
          <button class="period-btn" data-period="year">Год</button>
        </div>
      </div>
      <div id="statsText" style="margin:0.8rem 0;"></div>
      <canvas id="progressChart" width="400" height="200"></canvas>
    </div>
  </div>

  <script>
    (function() {
      // ---------- Константы программы ----------
      const START_DATE = '2026-06-21';
      const TOTAL_WEEKS = 26;
      const INITIAL_PUSHUP = 15;  // повторений в подходе
      const INITIAL_PRESS = 30;
      const SETS = 3;
      const WEEKLY_INCREMENT = 5;

      // ---------- Хранилище ----------
      const STORAGE_KEY = 'halfyear_plan_data';
      let planData = {
        startDate: START_DATE,
        weeks: [] // { weekIndex, pushupGoal, pressGoal, pushupDone, pressDone, pushupActual, pressActual }
      };

      // Загрузка / сохранение
      function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            planData = parsed;
            // убедимся, что 26 недель существуют
            if (!planData.weeks || planData.weeks.length !== TOTAL_WEEKS) {
              generateDefaultWeeks();
            }
          } catch (e) {
            generateDefaultWeeks();
          }
        } else {
          generateDefaultWeeks();
        }
      }

      function generateDefaultWeeks() {
        planData.weeks = [];
        for (let i = 0; i < TOTAL_WEEKS; i++) {
          planData.weeks.push({
            weekIndex: i,
            pushupGoal: (INITIAL_PUSHUP + i * WEEKLY_INCREMENT) * SETS,
            pressGoal: (INITIAL_PRESS + i * WEEKLY_INCREMENT) * SETS,
            pushupDone: false,
            pressDone: false,
            pushupActual: null,
            pressActual: null
          });
        }
        planData.startDate = START_DATE;
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(planData));
      }

      // ---------- Вспомогательные функции дат ----------
      function getWeekStartDate(weekIndex) {
        const start = new Date(START_DATE);
        start.setDate(start.getDate() + weekIndex * 7);
        return start;
      }

      function formatDateRange(weekIndex) {
        const start = getWeekStartDate(weekIndex);
        const end = new Date(start);
        end.setDate(end.getDate() + 6);
        const fmt = d => d.toISOString().split('T')[0].split('-').reverse().join('.');
        return `${fmt(start)} – ${fmt(end)}`;
      }

      // ---------- Отрисовка таблицы ----------
      const tbody = document.querySelector('#planTable tbody');

      function renderTable() {
        tbody.innerHTML = '';
        planData.weeks.forEach((week, idx) => {
          const row = document.createElement('tr');
          row.className = 'week-row';
          const pushupGoal = week.pushupGoal;
          const pressGoal = week.pressGoal;
          const pushupPerSet = pushupGoal / SETS;
          const pressPerSet = pressGoal / SETS;

          row.innerHTML = `
            <td><strong>${idx + 1}</strong></td>
            <td>${formatDateRange(idx)}</td>
            <td><span class="goal-text">3×${pushupPerSet}</span> (${pushupGoal})</td>
            <td><input type="checkbox" class="done-check pushup-done" data-week="${idx}" ${week.pushupDone ? 'checked' : ''}></td>
            <td><input type="number" class="fact-input pushup-actual" data-week="${idx}" value="${week.pushupActual ?? ''}" placeholder="${pushupGoal}" min="0"></td>
            <td><span class="goal-text">3×${pressPerSet}</span> (${pressGoal})</td>
            <td><input type="checkbox" class="done-check press-done" data-week="${idx}" ${week.pressDone ? 'checked' : ''}></td>
            <td><input type="number" class="fact-input press-actual" data-week="${idx}" value="${week.pressActual ?? ''}" placeholder="${pressGoal}" min="0"></td>
          `;
          tbody.appendChild(row);
        });

        // Навешиваем события
        document.querySelectorAll('.pushup-done').forEach(cb => {
          cb.addEventListener('change', (e) => {
            const weekIdx = parseInt(e.target.dataset.week);
            planData.weeks[weekIdx].pushupDone = e.target.checked;
            saveData();
            updateStats();
          });
        });
        document.querySelectorAll('.press-done').forEach(cb => {
          cb.addEventListener('change', (e) => {
            const weekIdx = parseInt(e.target.dataset.week);
            planData.weeks[weekIdx].pressDone = e.target.checked;
            saveData();
            updateStats();
          });
        });
        document.querySelectorAll('.pushup-actual').forEach(inp => {
          inp.addEventListener('change', (e) => {
            const weekIdx = parseInt(e.target.dataset.week);
            const val = e.target.value === '' ? null : parseInt(e.target.value);
            planData.weeks[weekIdx].pushupActual = isNaN(val) ? null : val;
            saveData();
            updateStats();
          });
        });
        document.querySelectorAll('.press-actual').forEach(inp => {
          inp.addEventListener('change', (e) => {
            const weekIdx = parseInt(e.target.dataset.week);
            const val = e.target.value === '' ? null : parseInt(e.target.value);
            planData.weeks[weekIdx].pressActual = isNaN(val) ? null : val;
            saveData();
            updateStats();
          });
        });
      }

      // ---------- Статистика ----------
      let chart = null;
      let currentPeriod = 'week';

      function getPeriodStart(period) {
        const ref = new Date(); // для реальной статистики используем сегодня, но план до декабря 2026
        const d = new Date(ref);
        switch(period) {
          case 'week': d.setDate(d.getDate() - 7); break;
          case 'month': d.setMonth(d.getMonth() - 1); break;
          case 'quarter': d.setMonth(d.getMonth() - 3); break;
          case 'halfyear': d.setMonth(d.getMonth() - 6); break;
          case 'year': d.setFullYear(d.getFullYear() - 1); break;
        }
        return d.toISOString().split('T')[0];
      }

      function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        const startPeriod = getPeriodStart(currentPeriod);
        
        // Фильтруем недели, чей диапазон попадает в период (хотя бы частично)
        const relevantWeeks = planData.weeks.filter((_, idx) => {
          const weekStart = getWeekStartDate(idx).toISOString().split('T')[0];
          const weekEnd = new Date(getWeekStartDate(idx));
          weekEnd.setDate(weekEnd.getDate() + 6);
          const weekEndStr = weekEnd.toISOString().split('T')[0];
          return weekStart <= today && weekEndStr >= startPeriod;
        });

        let pushupTotal = 0, pressTotal = 0;
        let completedWeeks = 0;
        relevantWeeks.forEach(w => {
          const pushActual = w.pushupActual !== null ? w.pushupActual : (w.pushupDone ? w.pushupGoal : 0);
          const pressActual = w.pressActual !== null ? w.pressActual : (w.pressDone ? w.pressGoal : 0);
          pushupTotal += pushActual;
          pressTotal += pressActual;
          if (w.pushupDone || w.pushupActual !== null || w.pressDone || w.pressActual !== null) {
            completedWeeks++;
          }
        });

        document.getElementById('statsText').innerHTML = `
          <div>✅ Активных недель в периоде: ${completedWeeks} / ${relevantWeeks.length}</div>
          <div>🏋️ Отжимания всего: <strong>${pushupTotal}</strong> повторений</div>
          <div>🔥 Пресс всего: <strong>${pressTotal}</strong> повторений</div>
          <div>💪 Общий объём: <strong>${pushupTotal + pressTotal}</strong></div>
        `;

        // График: суммарные повторения по неделям (факт или цель, если выполнено)
        const labels = [];
        const pushupData = [];
        const pressData = [];
        relevantWeeks.forEach((w, i) => {
          labels.push(`Нед. ${w.weekIndex + 1}`);
          pushupData.push(w.pushupActual !== null ? w.pushupActual : (w.pushupDone ? w.pushupGoal : 0));
          pressData.push(w.pressActual !== null ? w.pressActual : (w.pressDone ? w.pressGoal : 0));
        });

        const ctx = document.getElementById('progressChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              { label: 'Отжимания', data: pushupData, backgroundColor: '#ff6b6b', borderRadius: 6 },
              { label: 'Пресс', data: pressData, backgroundColor: '#48dbfb', borderRadius: 6 }
            ]
          },
          options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } },
            scales: {
              y: { beginAtZero: true, grid: { color: '#3a3a3c' }, ticks: { color: '#ccc' } },
              x: { ticks: { color: '#ccc' } }
            }
          }
        });
      }

      function setPeriod(period, btn) {
        currentPeriod = period;
        document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateStats();
      }

      // ---------- Экспорт / Импорт / Сброс ----------
      function exportData() {
        const blob = new Blob([JSON.stringify(planData, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `fitness_plan_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.weeks && data.startDate) {
              planData = data;
              saveData();
              renderTable();
              updateStats();
              alert('План загружен!');
            } else {
              alert('Неверный формат файла');
            }
          } catch (err) {
            alert('Ошибка чтения файла');
          }
        };
        reader.readAsText(file);
      }

      function resetProgress() {
        if (confirm('Точно сбросить все отметки и фактические повторения? Цели останутся.')) {
          planData.weeks.forEach(w => {
            w.pushupDone = false;
            w.pressDone = false;
            w.pushupActual = null;
            w.pressActual = null;
          });
          saveData();
          renderTable();
          updateStats();
        }
      }

      // ---------- Инициализация ----------
      function init() {
        loadData();
        renderTable();
        updateStats();

        document.getElementById('exportBtn').addEventListener('click', exportData);
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => {
          if (e.target.files[0]) importData(e.target.files[0]);
        });
        document.getElementById('resetBtn').addEventListener('click', resetProgress);

        document.getElementById('periodButtons').addEventListener('click', (e) => {
          if (e.target.classList.contains('period-btn')) {
            setPeriod(e.target.dataset.period, e.target);
          }
        });
      }

      init();
    })();
  </script>
</body>
</html>
