<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Твой Фитнес План 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50' font-size='50'>💪</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0c;
      color: #f0f0f0;
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 780px;
      background: rgba(22,22,24,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 1.5rem 1.2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.08);
    }
    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle { color: #8e8e93; font-size: 0.9rem; margin-bottom: 1.2rem; }
    .btn {
      background: #2c2c2e; border:1px solid #444; color:white;
      padding:0.6rem 1rem; border-radius:2rem; font-weight:600;
      font-size:0.85rem; cursor:pointer; margin-right:0.5rem; margin-bottom:0.5rem;
    }
    .btn.primary { background:#ff6b6b; border-color:#ff6b6b; }
    .week-block {
      background: rgba(44,44,48,0.5); backdrop-filter:blur(10px);
      border-radius:1rem; margin-bottom:0.8rem; border:1px solid rgba(255,255,255,0.05);
    }
    .week-header {
      padding:0.8rem; cursor:pointer; display:flex; justify-content:space-between;
      font-weight:600; user-select:none; flex-wrap:wrap; gap:0.3rem;
    }
    .week-days { padding:0 0.8rem 0.8rem; display:none; }
    .week-days.open { display:block; }
    .day-row {
      display:flex; gap:0.5rem; align-items:center; margin:0.5rem 0;
      background:rgba(255,255,255,0.02); padding:0.5rem; border-radius:0.7rem;
      flex-wrap:wrap;
    }
    .day-label { min-width:4.5rem; font-weight:600; }
    input[type="number"] {
      width:65px; background:#2c2c2e; border:1px solid #3a3a3c;
      color:white; padding:0.4rem; border-radius:0.5rem; text-align:center;
    }
    .exercise-group {
      display:flex; align-items:center; gap:0.2rem; flex-wrap:wrap;
    }
    .exercise-group span {
      font-size:0.75rem; color:#aaa; width:32px;
    }
    .stats-panel {
      background:rgba(44,44,48,0.6); border-radius:1.2rem; padding:1rem; margin-top:1.5rem;
    }
    .period-btn {
      background:#2c2c2e; border:1px solid #444; color:#ccc;
      padding:0.4rem 1rem; border-radius:2rem; font-weight:600; font-size:0.8rem;
      cursor:pointer; margin-right:0.3rem;
    }
    .period-btn.active { background:#feca57; color:#0a0a0a; }
    canvas { margin-top:0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💪 Полгода Прогресса 2026</h1>
    <div class="subtitle">21.06.2026 – 20.12.2026 • +5 каждую неделю</div>
    <div>
      <button id="exportBtn" class="btn">📤 Сохранить</button>
      <button id="importBtn" class="btn">📥 Загрузить</button>
      <input type="file" id="importFile" accept=".json" hidden>
      <button id="fillAllBtn" class="btn primary">⚡ Заполнить всё</button>
      <button id="resetBtn" class="btn">🔄 Сброс</button>
    </div>
    <div id="weeksContainer"></div>
    <div class="stats-panel">
      <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
        <h3>📊 Статистика</h3>
        <div id="periodButtons">
          <button class="period-btn active" data-period="week">Неделя</button>
          <button class="period-btn" data-period="month">Месяц</button>
          <button class="period-btn" data-period="quarter">3 мес</button>
          <button class="period-btn" data-period="halfyear">6 мес</button>
          <button class="period-btn" data-period="year">Год</button>
        </div>
      </div>
      <div id="statsText" style="margin:0.8rem 0;"></div>
      <canvas id="progressChart" width="300" height="180"></canvas>
    </div>
  </div>

  <script>
    console.log('Скрипт загружен (4 упражнения)');
    (function() {
      // ---------- КОНСТАНТЫ ----------
      const START_DATE = '2026-06-21';
      const TOTAL_WEEKS = 26;
      const INITIAL = {
        pushup: 15,   // отжимания (повторений в подходе)
        press: 30,    // пресс
        squat: 20,    // приседания
        plank: 30     // планка (секунд в подходе)
      };
      const SETS = 3;
      const INCREMENT = 5;
      const STORAGE_KEY = 'fitness_plan_v3_4exercises';

      let planData = { weeks: [] };

      // ---------- ЗАГРУЗКА / СОХРАНЕНИЕ ----------
      function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          try { planData = JSON.parse(raw); } catch(e) { planData.weeks = []; }
        }
        if (!planData.weeks || planData.weeks.length !== TOTAL_WEEKS) {
          planData.weeks = [];
          for (let i = 0; i < TOTAL_WEEKS; i++) {
            const days = [];
            for (let d = 0; d < 7; d++) {
              days.push({
                pushup: null,
                press: null,
                squat: null,
                plank: null,
                rest: false
              });
            }
            planData.weeks.push({
              pushupGoal: (INITIAL.pushup + i * INCREMENT) * SETS,
              pressGoal: (INITIAL.press + i * INCREMENT) * SETS,
              squatGoal: (INITIAL.squat + i * INCREMENT) * SETS,
              plankGoal: (INITIAL.plank + i * INCREMENT) * SETS,
              days: days
            });
          }
        }
        console.log('Данные загружены, недель:', planData.weeks.length);
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(planData));
      }

      // ---------- ДАТЫ ----------
      function getWeekStart(weekIdx) {
        const d = new Date(START_DATE);
        d.setDate(d.getDate() + weekIdx * 7);
        return d;
      }

      function formatDate(d) {
        return d.toISOString().split('T')[0].split('-').reverse().join('.');
      }

      // ---------- РЕНДЕР ----------
      const container = document.getElementById('weeksContainer');

      function render() {
        container.innerHTML = '';
        planData.weeks.forEach((week, wi) => {
          const block = document.createElement('div');
          block.className = 'week-block';

          const header = document.createElement('div');
          header.className = 'week-header';
          header.innerHTML = `
            <span>📅 Нед.${wi+1} (${formatDate(getWeekStart(wi))} – ${formatDate(new Date(getWeekStart(wi).getTime()+6*86400000))})</span>
            <span>🎯 Отж:${week.pushupGoal} | Пр:${week.pressGoal} | Прис:${week.squatGoal} | План:${week.plankGoal}с</span>
          `;
          header.addEventListener('click', () => {
            daysDiv.classList.toggle('open');
          });

          const daysDiv = document.createElement('div');
          daysDiv.className = 'week-days';

          week.days.forEach((day, di) => {
            const date = new Date(getWeekStart(wi));
            date.setDate(date.getDate() + di);
            const dayRow = document.createElement('div');
            dayRow.className = 'day-row';

            const disabledAttr = day.rest ? 'disabled' : '';
            const pushupVal = day.pushup ?? '';
            const pressVal = day.press ?? '';
            const squatVal = day.squat ?? '';
            const plankVal = day.plank ?? '';

            dayRow.innerHTML = `
              <span class="day-label">${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'][di]} ${formatDate(date)}</span>
              <div class="exercise-group"><span>Отж</span><input type="number" class="pushup-input" value="${pushupVal}" ${disabledAttr}></div>
              <div class="exercise-group"><span>Прс</span><input type="number" class="press-input" value="${pressVal}" ${disabledAttr}></div>
              <div class="exercise-group"><span>Прис</span><input type="number" class="squat-input" value="${squatVal}" ${disabledAttr}></div>
              <div class="exercise-group"><span>План</span><input type="number" class="plank-input" value="${plankVal}" ${disabledAttr}></div>
              <label><input type="checkbox" class="rest-check" ${day.rest ? 'checked' : ''}> Вых.</label>
            `;

            // События ввода
            const inputs = {
              pushup: dayRow.querySelector('.pushup-input'),
              press: dayRow.querySelector('.press-input'),
              squat: dayRow.querySelector('.squat-input'),
              plank: dayRow.querySelector('.plank-input')
            };
            for (let [key, inp] of Object.entries(inputs)) {
              inp.addEventListener('change', e => {
                const val = e.target.value === '' ? null : parseInt(e.target.value) || 0;
                week.days[di][key] = val;
                saveData();
                updateStats();
              });
            }

            // Выходной
            dayRow.querySelector('.rest-check').addEventListener('change', e => {
              week.days[di].rest = e.target.checked;
              if (e.target.checked) {
                week.days[di].pushup = null;
                week.days[di].press = null;
                week.days[di].squat = null;
                week.days[di].plank = null;
              }
              saveData();
              render(); // перерисовать для обновления disabled
              updateStats();
            });

            daysDiv.appendChild(dayRow);
          });

          block.appendChild(header);
          block.appendChild(daysDiv);
          container.appendChild(block);
        });
      }

      // ---------- СТАТИСТИКА ----------
      let chart = null;
      let currentPeriod = 'week';

      function updateStats() {
        const now = new Date();
        const start = new Date(now);
        switch(currentPeriod) {
          case 'week': start.setDate(start.getDate()-7); break;
          case 'month': start.setMonth(start.getMonth()-1); break;
          case 'quarter': start.setMonth(start.getMonth()-3); break;
          case 'halfyear': start.setMonth(start.getMonth()-6); break;
          case 'year': start.setFullYear(start.getFullYear()-1); break;
        }
        const startStr = start.toISOString().split('T')[0];
        const endStr = now.toISOString().split('T')[0];

        let totals = { pushup:0, press:0, squat:0, plank:0 };
        let daysCount = 0;
        planData.weeks.forEach((week, wi) => {
          week.days.forEach((day, di) => {
            const date = new Date(getWeekStart(wi));
            date.setDate(date.getDate() + di);
            const dateStr = date.toISOString().split('T')[0];
            if (dateStr >= startStr && dateStr <= endStr && !day.rest) {
              totals.pushup += day.pushup || 0;
              totals.press += day.press || 0;
              totals.squat += day.squat || 0;
              totals.plank += day.plank || 0;
              daysCount++;
            }
          });
        });

        document.getElementById('statsText').innerHTML = `
          <div>📅 Дней: ${daysCount}</div>
          <div>🏋️ Отжимания: <strong>${totals.pushup}</strong></div>
          <div>🔥 Пресс: <strong>${totals.press}</strong></div>
          <div>🦵 Приседания: <strong>${totals.squat}</strong></div>
          <div>⏱️ Планка: <strong>${totals.plank} сек</strong></div>
          <div>💪 Общий объём: <strong>${totals.pushup+totals.press+totals.squat+totals.plank}</strong></div>
        `;

        // График: 4 столбца
        const labels = [], pushupData = [], pressData = [], squatData = [], plankData = [];
        planData.weeks.forEach((week, wi) => {
          const ws = getWeekStart(wi).toISOString().split('T')[0];
          const we = new Date(getWeekStart(wi).getTime()+6*86400000).toISOString().split('T')[0];
          if (we >= startStr && ws <= endStr) {
            labels.push('Нед.'+(wi+1));
            let p=0, pr=0, s=0, pl=0;
            week.days.forEach(d => {
              if(!d.rest) {
                p += d.pushup||0; pr += d.press||0; s += d.squat||0; pl += d.plank||0;
              }
            });
            pushupData.push(p); pressData.push(pr); squatData.push(s); plankData.push(pl);
          }
        });

        const ctx = document.getElementById('progressChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              { label:'Отжимания', data:pushupData, backgroundColor:'#ff6b6b' },
              { label:'Пресс', data:pressData, backgroundColor:'#48dbfb' },
              { label:'Приседания', data:squatData, backgroundColor:'#feca57' },
              { label:'Планка (сек)', data:plankData, backgroundColor:'#ff9ff3' }
            ]
          },
          options: { responsive:true, scales:{ y:{ beginAtZero:true } } }
        });
      }

      // ---------- КНОПКИ ----------
      document.getElementById('exportBtn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(planData)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'fitness_plan.json';
        a.click();
      });

      document.getElementById('importBtn').addEventListener('click', () => {
        document.getElementById('importFile').click();
      });
      document.getElementById('importFile').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            planData = JSON.parse(ev.target.result);
            saveData();
            render();
            updateStats();
          } catch(ex) { alert('Ошибка файла'); }
        };
        reader.readAsText(file);
      });

      document.getElementById('fillAllBtn').addEventListener('click', () => {
        if (!confirm('Заполнить все дни по целям (равномерно)?')) return;
        planData.weeks.forEach(week => {
          const activeDays = week.days.filter(d => !d.rest).length || 1;
          const pushupPerDay = Math.floor(week.pushupGoal / activeDays);
          const pressPerDay = Math.floor(week.pressGoal / activeDays);
          const squatPerDay = Math.floor(week.squatGoal / activeDays);
          const plankPerDay = Math.floor(week.plankGoal / activeDays);
          week.days.forEach(d => {
            if (!d.rest) {
              d.pushup = pushupPerDay;
              d.press = pressPerDay;
              d.squat = squatPerDay;
              d.plank = plankPerDay;
            }
          });
        });
        saveData(); render(); updateStats();
      });

      document.getElementById('resetBtn').addEventListener('click', () => {
        if (!confirm('Сбросить все данные?')) return;
        planData.weeks.forEach(week => week.days.forEach(d => {
          d.pushup = null; d.press = null; d.squat = null; d.plank = null; d.rest = false;
        }));
        saveData(); render(); updateStats();
      });

      // Периоды
      document.getElementById('periodButtons').addEventListener('click', e => {
        if (e.target.classList.contains('period-btn')) {
          document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          currentPeriod = e.target.dataset.period;
          updateStats();
        }
      });

      // ---------- СТАРТ ----------
      loadData();
      render();
      updateStats();
      console.log('Готово!');
    })();
  </script>
</body>
</html>
